<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记详情 | Aertly</title>
  <meta name="description" content="Aertly 笔记详情页。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="note">
  <div class="petal-field" aria-hidden="true"></div>
  <div class="petal petal-a"></div>
  <div class="petal petal-c"></div>

  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="./index.html">
        <span class="brand-avatar">
          <img src="./person.jpg" alt="头像">
        </span>
        <span class="brand-text">
          <strong>Aertly</strong>
        </span>
      </a>
      <nav class="site-nav">
        <a href="./index.html" data-nav="home">首页</a>
        <a href="./essays.html" data-nav="essays">文章</a>
        <a href="./projects.html" data-nav="projects">笔记</a>
        <a href="./about.html" data-nav="about">关于</a>
      </nav>
      <button class="music-toggle" id="music-toggle" type="button" aria-pressed="false">BGM Off</button>
    </header>

    <main class="reading-layout">
      <article class="reading-paper">
        <p class="eyebrow" id="note-kicker"></p>
        <h1 class="reading-title" id="note-title"></h1>
        <div class="post-card__meta reading-meta" id="note-meta"></div>
        <p class="reading-intro" id="note-intro"></p>
        <div id="note-content"></div>
        <section class="comment-section" data-reveal>
          <div class="section-heading compact">
            <p class="eyebrow">Comments</p>
            <h2>评论</h2>
          </div>
          <form class="comment-form" id="comment-form">
            <div class="comment-form__grid">
              <input id="comment-name" type="text" placeholder="昵称" required>
              <input id="comment-email" type="email" placeholder="邮箱" required>
            </div>
            <input id="comment-avatar" type="url" placeholder="头像链接（可填图片 URL）">
            <textarea id="comment-body" placeholder="写下你的评论..." rows="5" required></textarea>
            <button class="button primary" type="submit">发布评论</button>
          </form>
          <div class="comment-list" id="comment-list"></div>
        </section>
      </article>

      <aside class="reading-sidebar">
        <section class="panel" data-reveal>
          <p class="eyebrow">Related Notes</p>
          <h2>你也许会继续读</h2>
          <div class="post-list related-list" id="related-notes"></div>
        </section>
      </aside>
    </main>

    <footer class="site-footer">
      <p>© 2026 Aertly</p>
      <a href="./projects.html">回到笔记页</a>
    </footer>
  </div>

  <audio id="bgm" loop preload="auto">
    <source src="./bgm.mp3" type="audio/mpeg">
  </audio>
  <script src="./content.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
